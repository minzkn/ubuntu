# Options for the charon IKE daemon.
# Only non-default values are listed; see strongswan.conf(5) for full reference.
charon {

    # Close the IKE_SA if setup of the CHILD_SA along with IKE_AUTH failed.
    close_ike_on_child_failure = yes

    # Do not install routes; host-network container manages its own routing.
    install_routes = no

    # Disable the dedicated routing table (host-network container).
    routing_table = 0
    routing_table_prio = 0

}

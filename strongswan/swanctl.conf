# swanctl.conf - strongSwan swanctl/vici configuration (strongSwan 6.x)
#
# Refer to swanctl.conf(5) for details.
# Replaces the deprecated ipsec.conf + ipsec.secrets (stroke interface).
#
# Reload at runtime: swanctl --load-all --noprompt


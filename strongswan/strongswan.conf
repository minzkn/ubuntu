# strongswan.conf - strongSwan configuration file
#
# Refer to the strongswan.conf(5) manpage for details
#
# Uses charon-systemd daemon with swanctl/vici interface (strongSwan 6.x)

# Load plugin-specific configs first so our settings below take precedence
include strongswan.d/*.conf

charon-systemd {
    load_modular = yes

    plugins {
        include strongswan.d/charon/*.conf
    }

    # Auto-load swanctl.conf after daemon initializes
    start-scripts {
        load-all = /usr/sbin/swanctl --load-all --noprompt
    }

    # Log to stderr for Docker (systemd journal not available in container)
    filelog {
        stderr {
            default = 1
            ike    = 2
            net    = 1
            esp    = 1
            cfg    = 2
        }
    }

    # Disable journal logging (no systemd in container)
    journal {
        default = -1
    }
}

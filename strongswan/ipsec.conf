# ipsec.conf - strongSwan IPsec configuration file
#
# NOTE: This is a template. Fill in left/right addresses and connection
#       definitions before starting the container.
#       See: https://wiki.strongswan.org/projects/strongswan/wiki/IpsecConf

config setup
	# strictcrlpolicy=yes
	uniqueids=yes

# Default values inherited by all conn sections
conn %default
	ikelifetime=60m
	keylife=20m
	rekeymargin=3m
	keyingtries=1
	keyexchange=ikev2

# --- IKEv2 site-to-site example (PSK) ---
# Uncomment and edit to activate.
#
#conn site-to-site
#	left=%defaultroute         # local WAN address (auto-detect)
#	leftsubnet=10.0.1.0/24     # local LAN subnet
#	right=203.0.113.1           # remote peer WAN address
#	rightsubnet=10.0.2.0/24    # remote LAN subnet
#	authby=secret               # use PSK from ipsec.secrets
#	auto=start                  # bring up on daemon start

# --- IKEv2 roadwarrior / client example (cert) ---
#
#conn roadwarrior
#	left=%defaultroute
#	leftsubnet=0.0.0.0/0
#	leftcert=serverCert.pem
#	leftid=@vpn.example.com
#	right=%any                  # accept any client
#	rightsubnet=10.10.10.0/24
#	rightsourceip=10.10.10.0/24 # virtual IP pool for clients
#	auto=add

# End of ipsec.conf
